openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for chbaye7 ghost ride-hailing app
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: rides
    description: Ride operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rides:
    post:
      operationId: createRide
      tags: [rides]
      summary: Create a new ride request
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRideRequest"
      responses:
        "201":
          description: Ride created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ride"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rides/active:
    get:
      operationId: getActiveRide
      tags: [rides]
      summary: Get the current active ride for the authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Active ride or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveRideResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    User:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [rider, driver]
        phone:
          type: string
      required:
        - _id
        - name
        - email
        - role
        - phone

    Ride:
      type: object
      properties:
        _id:
          type: string
        riderId:
          type: string
        driverId:
          type: string
          nullable: true
        status:
          type: string
          enum: [searching, accepted, arrived, started, completed]
        pickupLocation:
          type: string
        destination:
          type: string
        driver:
          $ref: "#/components/schemas/User"
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - _id
        - riderId
        - status
        - pickupLocation
        - destination
        - createdAt
        - updatedAt

    ActiveRideResponse:
      type: object
      properties:
        ride:
          $ref: "#/components/schemas/Ride"
          nullable: true
      required:
        - ride

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
      required:
        - user
        - token

    RegisterRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [rider, driver]
        phone:
          type: string
      required:
        - name
        - email
        - password
        - role
        - phone

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    CreateRideRequest:
      type: object
      properties:
        pickupLocation:
          type: string
        destination:
          type: string
      required:
        - pickupLocation
        - destination

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message
